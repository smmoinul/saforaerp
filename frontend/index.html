<style>
:root{--or:#FF6B35;--am:#F7931E;--gd:#FFD23F;--tl:#00D4AA;--bl:#3B82F6;--pu:#8B5CF6;--gn:#22C55E;--rd:#EF4444;--pk:#EC4899;--cy:#06B6D4;--in:#6366F1;--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--or);border-radius:2px}

/* LOGIN */
#loginPage{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(255,107,53,.08),transparent 60%),radial-gradient(ellipse 60% 50% at 70% 60%,rgba(255,210,63,.05),transparent 60%)}

.lbox{position:relative;z-index:1;width:460px;max-width:95vw;background:var(--bg2);border:1px solid var(--br2);border-radius:24px;padding:40px;box-shadow:var(--sh)}

/* APP */

.tbl-wrap{overflow-x:auto;border-radius:11px;border:1px solid var(--br)}

/* FORMS */

.b{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:14px}
.bg{background:rgba(34,197,94,.12);color:var(--gn)}
.br{background:rgba(239,68,68,.12);color:var(--rd)}

.stats-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:12px}

.t-it:hover{color:var(--tx)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--br2);border-radius:16px;padding:22px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:pgIn .2s ease;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px}
.modal-close:hover{color:var(--rd)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--br)}

/* TOAST */
#toasts{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .3s ease;min-width:220px;max-width:320px;background:var(--bg2)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{border:1px solid rgba(34,197,94,.3)}.toast.err{border:1px solid rgba(239,68,68,.3)}.toast.inf{border:1px solid rgba(59,130,246,.3)}.toast.wrn{border:1px solid rgba(247,147,30,.3)}

/* REPORT AREA */
.report-filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;background:var(--bg3);border-radius:11px;padding:14px;border:1px solid var(--br)}
.report-area{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:16px;min-height:300px}

@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:50;transition:left .3s}.sidebar.mob-open{left:0}
  .welcome-grid{grid-template-columns:1fr 1fr}.fn-grid{grid-template-columns:1fr}
  .fgrid,.fgrid3{grid-template-columns:1fr}
}

/* Logo Image Styling */
.s-logo img { transition: opacity .2s; }
.sidebar.col .s-logo img { width: 34px; height: 34px; object-fit: contain; }
.l-logo img { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.12)); }
</style>
</head>

function fillLogin(email,pass,role){
  document.getElementById('lEmail').value=email;
  document.getElementById('lPass').value=pass;
  document.getElementById('lRole').value=role;
}
function doLogin(){
  var role = document.getElementById('lRole').value;
  var name = {administrator:'Administrator',super_admin:'Super Admin',admin:'Admin User',general:'General User',view_only:'Viewer'}[role];
  S.user = {name, role, email: document.getElementById('lEmail').value};
  S.role = role;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  updateUserUI();
  renderWelcome();
}
function doLogout(){
  document.getElementById('app').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  S.user=null;
}

// ══════════════════════════════════════════════════════
//  BUILD SIDEBAR NAV
// ══════════════════════════════════════════════════════
function buildNav(){
  var nav = document.getElementById('sNav');
  nav.innerHTML = '';
  ERP_MENU.forEach(function(mc){
    if(!mc.roles.includes(S.role)) return;
    // Count items
    var total = mc.sub.reduce((a,s)=>a+s.items.length,0);
    // Main category header
    var mcEl = document.createElement('div');
    mcEl.className = 'mc-item';
    mcEl.setAttribute('data-id', mc.id);
    mcEl.innerHTML =
      '<div class="mc-icon" style="background:'+mc.color+'22">'+mc.icon+'</div>'+
      '<span class="mc-lbl">'+(S.lang==='bn'?mc.bn:mc.en)+'</span>'+
      '<span class="mc-badge">'+total+'</span>'+
      '<span class="mc-arrow">▶</span>';
    mcEl.onclick = function(){ toggleMC(mc.id, mcEl); };
    nav.appendChild(mcEl);
    // Sub categories container
    var subCont = document.createElement('div');
    subCont.className = 'sub-menu';
    subCont.id = 'mc-sub-'+mc.id;
    mc.sub.forEach(function(sc){
      // Sub category
      var scEl = document.createElement('div');
      scEl.className = 'sm-item';
      scEl.setAttribute('data-id', sc.id);
      scEl.innerHTML =
        '<span>'+sc.icon+'</span>'+
        '<span>'+(S.lang==='bn'?sc.bn:sc.en)+'</span>'+
        '<span class="sm-arrow">▶</span>';
      scEl.onclick = function(e){ e.stopPropagation(); toggleSC(mc.id, sc.id, scEl); };
      subCont.appendChild(scEl);
      // Items container
      var itemCont = document.createElement('div');
      itemCont.className = 'ssm-list';
      itemCont.id = 'sc-items-'+sc.id;
      sc.items.forEach(function(item){
        var itemEl = document.createElement('div');
        itemEl.className = 'ssm-item';
        itemEl.setAttribute('data-id', item.id);
        var tc = TYPE_CONFIG[item.type]||TYPE_CONFIG.form;
        itemEl.innerHTML = '<span style="color:'+tc.color+';margin-right:4px;font-size:11px">'+tc.icon+'</span><span>'+(S.lang==='bn'?item.bn:item.label)+'</span>';
        itemEl.onclick = function(e){ e.stopPropagation(); showModule(mc, sc, item); };
        itemCont.appendChild(itemEl);
      });
      subCont.appendChild(itemCont);
    });
    nav.appendChild(subCont);
  });
}

function toggleMC(mcId, el){
  var sub = document.getElementById('mc-sub-'+mcId);
  var isOpen = sub.classList.contains('open');
  // Close all
  document.querySelectorAll('.sub-menu').forEach(s=>s.classList.remove('open'));
  document.querySelectorAll('.mc-item').forEach(m=>{m.classList.remove('act','open');});
  if(!isOpen){
    sub.classList.add('open');
    el.classList.add('act','open');
  }
}
function toggleSC(mcId, scId, el){
  var items = document.getElementById('sc-items-'+scId);
  var isOpen = items.classList.contains('open');
  // Close all sub-items in this mc
  var parent = document.getElementById('mc-sub-'+mcId);
  parent.querySelectorAll('.ssm-list').forEach(s=>s.classList.remove('open'));
  parent.querySelectorAll('.sm-item').forEach(s=>{s.classList.remove('act','open');});
  if(!isOpen){
    items.classList.add('open');
    el.classList.add('act','open');
  }
}

// ══════════════════════════════════════════════════════
//  MENU SEARCH
// ══════════════════════════════════════════════════════
function filterMenus(query){
  if(!query.trim()){ buildNav(); return; }
  query = query.toLowerCase();
  var nav = document.getElementById('sNav');
  nav.innerHTML = '';
  ERP_MENU.forEach(function(mc){
    if(!mc.roles.includes(S.role)) return;
    mc.sub.forEach(function(sc){
      sc.items.forEach(function(item){
        if(item.label.toLowerCase().includes(query)||item.en.toLowerCase().includes(query)||item.bn.includes(query)){
          var itemEl = document.createElement('div');
          itemEl.className = 'sm-item';
          var tc = TYPE_CONFIG[item.type]||TYPE_CONFIG.form;
          itemEl.innerHTML =
            '<span>'+mc.icon+'</span>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:12px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis">'+(S.lang==='bn'?item.bn:item.label)+'</div>'+
              '<div style="font-size:10px;color:var(--tx3)">'+(S.lang==='bn'?mc.bn:mc.en)+' › '+(S.lang==='bn'?sc.bn:sc.en)+'</div>'+
            '</div>'+
            '<span style="color:'+tc.color+';font-size:10px">'+tc.icon+'</span>';
          itemEl.onclick = function(){ showModule(mc, sc, item); };
          nav.appendChild(itemEl);
        }
      });
    });
  });
  if(!nav.children.length){
    nav.innerHTML = '<div style="padding:16px;text-align:center;color:var(--tx3);font-size:12px">No results found</div>';
  }
}

function showModule(mc, sc, item){
  S.currentPage = item.id;
  S.currentCategory = mc.id;
  // Highlight nav
  document.querySelectorAll('.ssm-item').forEach(el=>{
    el.classList.toggle('act', el.getAttribute('data-id')===item.id);
  });
  // Set topbar
  document.getElementById('pgTitle').textContent = S.lang==='bn'?item.bn:item.label;
  document.getElementById('pgBreadcrumb').innerHTML =
    '<span>'+(S.lang==='bn'?mc.bn:mc.en)+'</span>'+
    '<span class="sep">›</span>'+
    '<span>'+(S.lang==='bn'?sc.bn:sc.en)+'</span>'+
    '<span class="sep">›</span>'+
    '<span class="cur">'+(S.lang==='bn'?item.bn:item.label)+'</span>';
  // Render content
  var tc = TYPE_CONFIG[item.type]||TYPE_CONFIG.form;
  var content = document.getElementById('mainContent');
  content.innerHTML = renderModulePage(mc, sc, item, tc);
  // Attach events
  attachPageEvents(item);
}

function renderModulePage(mc, sc, item, tc){
  var isViewOnly = S.role === 'view_only';
  var canEdit = !isViewOnly;
  var isReport = item.type==='report'||item.type==='print';
  var isDashboard = item.type==='dashboard';

  var html = '';
  // Header
  html += '<div class="mod-header">';
  html += '<div class="mod-icon-big" style="background:'+mc.color+'20">'+mc.icon+'</div>';
  html += '<div><div class="mod-title">'+(S.lang==='bn'?item.bn:item.label)+'</div>';
  html += '<div class="mod-desc"><span class="b" style="background:'+tc.color+'20;color:'+tc.color+'">'+tc.icon+' '+tc.label+'</span> &nbsp;';
  html += '<span style="color:var(--tx3);font-size:12px">'+(S.lang==='bn'?mc.bn:mc.en)+' › '+(S.lang==='bn'?sc.bn:sc.en)+'</span></div>';
  html += '</div>';
  if(isReport){
    html += '<div style="margin-left:auto;display:flex;gap:8px">';
    html += '<button class="btn btn-b btn-sm" onclick="printReport()">🖨️ Print</button>';
    html += '<button class="btn btn-s btn-sm" onclick="exportReport()">📥 Export</button>';
    html += '</div>';
  }
  if(isDashboard){
    html += '<div style="margin-left:auto"><span class="b bg">● Live</span></div>';
  }
  html += '</div>';

  // Content based on type
  if(isDashboard){
    html += renderDashboard(item);
  } else if(isReport){
    html += renderReportPage(item);
  } else if(item.type==='config'){
    html += renderConfigPage(item, canEdit);
  } else if(item.type==='list'){
    html += renderListPage(item, canEdit);
  } else if(item.type==='search'){
    html += renderSearchPage(item);
  } else {
    html += renderFormPage(item, canEdit);
  }

  // Related items
  var related = sc.items.filter(i=>i.id!==item.id).slice(0,4);
  if(related.length){
    html += '<div class="card" style="margin-top:12px">';
    html += '<div class="sec-hd"><h3>Related Menus in "'+sc.label+'"</h3></div>';
    html += '<div class="fn-grid">';
    related.forEach(function(r){
      var rtc = TYPE_CONFIG[r.type]||TYPE_CONFIG.form;
      html += '<div class="fn-card" onclick="showModuleById(\''+mc.id+'\',\''+sc.id+'\',\''+r.id+'\')">';
      html += '<div class="fn-ico" style="background:'+rtc.color+'20">'+rtc.icon+'</div>';
      html += '<div><div class="fn-name">'+(S.lang==='bn'?r.bn:r.label)+'</div><div class="fn-type">'+rtc.label+'</div></div>';
      html += '</div>';
    });
    html += '</div></div>';
  }
  return html;
}

    ['Total Records','Active Today','Pending Actions','This Month'].map((l,i)=>{

function openMcById(mcId){
  var mc = ERP_MENU.find(m=>m.id===mcId);
  if(!mc) return;
  // Open in sidebar
  document.querySelectorAll('.sub-menu').forEach(s=>s.classList.remove('open'));
  document.querySelectorAll('.mc-item').forEach(m=>m.classList.remove('act','open'));
  var sub = document.getElementById('mc-sub-'+mcId);
  var mcEl = document.querySelector('.mc-item[data-id="'+mcId+'"]');
  if(sub){ sub.classList.add('open'); }
  if(mcEl){ mcEl.classList.add('act','open'); }
  // Show category overview
  showCategoryOverview(mc);
}

function showCategoryOverview(mc){
  document.getElementById('pgTitle').textContent = S.lang==='bn'?mc.bn:mc.en;
  document.getElementById('pgBreadcrumb').innerHTML =
    '<span>SaforaERP</span><span class="sep">›</span><span class="cur">'+(S.lang==='bn'?mc.bn:mc.en)+'</span>';
  var html = '<div class="mod-header"><div class="mod-icon-big" style="background:'+mc.color+'20">'+mc.icon+'</div>';
  html += '<div><div class="mod-title">'+(S.lang==='bn'?mc.bn:mc.en)+'</div>';
  html += '<div class="mod-desc" style="color:var(--tx3)">';
  html += mc.sub.length+' sub-categories · '+mc.sub.reduce((a,s)=>a+s.items.length,0)+' total menu items</div></div></div>';

  mc.sub.forEach(function(sc){
    html += '<div class="card" style="margin-bottom:12px">';
    html += '<div class="sec-hd"><h3>'+sc.icon+' '+(S.lang==='bn'?sc.bn:sc.en)+'</h3>';
    html += '<span class="b bx">'+sc.items.length+' menus</span></div>';
    html += '<div class="fn-grid">';
    sc.items.forEach(function(item){
      var tc = TYPE_CONFIG[item.type]||TYPE_CONFIG.form;
      html += '<div class="fn-card" onclick="showModuleById(\''+mc.id+'\',\''+sc.id+'\',\''+item.id+'\')">';
      html += '<div class="fn-ico" style="background:'+tc.color+'20">'+tc.icon+'</div>';
      html += '<div><div class="fn-name">'+(S.lang==='bn'?item.bn:item.label)+'</div>';
      html += '<div class="fn-type">'+tc.label+'</div></div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('mainContent').innerHTML = html;
}

function showModuleById(mcId, scId, itemId){
  var mc = ERP_MENU.find(m=>m.id===mcId);
  if(!mc) return;
  var sc = mc.sub.find(s=>s.id===scId);
  if(!sc) return;
  var item = sc.items.find(i=>i.id===itemId);
  if(!item) return;
  showModule(mc, sc, item);
  // Also open sidebar nav
  var sub = document.getElementById('mc-sub-'+mcId);
  var items = document.getElementById('sc-items-'+scId);
  var mcEl = document.querySelector('.mc-item[data-id="'+mcId+'"]');
  if(sub){ sub.classList.add('open'); }
  if(items){ items.classList.add('open'); }
  if(mcEl){ mcEl.classList.add('act','open'); }
}

// ── API CONFIG ───────────────────────────────────────────────
var API = {
  base: localStorage.getItem('erp_api_base') || 'http://localhost:8000/api',
  token: localStorage.getItem('erp_token') || null,
  async req(method, path, data) {
    var headers = { 'Content-Type': 'application/json' };
    if (this.token) headers['Authorization'] = 'Bearer ' + this.token;
    var url = this.base + path;
    var opts = { method, headers };
    if (data && method === 'GET') {
      var p = new URLSearchParams(Object.entries(data).filter(function(e){ return e[1] != null && e[1] !== ''; }));
      if (p.toString()) url += '?' + p;
    } else if (data) {
      opts.body = JSON.stringify(data);
    }
    try {
      var res = await fetch(url, opts);
      if (res.status === 401) { doLogout(); return null; }
      var json = await res.json();
      if (!res.ok) { toast((json.detail || 'Server error'), 'err'); return null; }
      return json;
    } catch(e) { return null; }
  },
  get:  function(p, d) { return this.req('GET', p, d); },
  post: function(p, d) { return this.req('POST', p, d); },
  put:  function(p, d) { return this.req('PUT', p, d); },
  del:  function(p)    { return this.req('DELETE', p); }
};

// ── CACHE (loaded after login) ───────────────────────────────
var C = { items:[], customers:[], suppliers:[], employees:[], departments:[], designations:[], grades:[], units:[], coaOpts:'' };

async function loadCache() {
  var calls = [
    API.get('/hr/departments'),
    API.get('/hr/designations'),
    API.get('/inventory/items', {page:1,page_size:500}),
    API.get('/customer/', {page:1,page_size:500}),
    API.get('/supplier/', {page:1,page_size:500}),
    API.get('/hr/grades'),
    API.get('/inventory/units'),
  ];
  var results = await Promise.allSettled(calls);
  var get = function(r) { return (r.status==='fulfilled' && r.value && r.value.data) ? r.value.data : []; };
  C.departments  = get(results[0]);
  C.designations = get(results[1]);
  C.items        = get(results[2]);
  C.customers    = get(results[3]);
  C.suppliers    = get(results[4]);
  C.grades       = get(results[5]);
  C.units        = get(results[6]);
  fillGlobalDropdowns();
}

function fillGlobalDropdowns() {
  document.querySelectorAll('select[data-src]').forEach(function(sel) {
    var src = sel.getAttribute('data-src');
    if (C[src]) sel.innerHTML = sopts(C[src]);
  });
}

// ── HELPERS ──────────────────────────────────────────────────
function sopts(arr, v, l, ph) {
  v = v || 'id'; l = l || 'name'; ph = ph || '-- Select --';
  return '<option value="">' + ph + '</option>' +
    (arr||[]).map(function(r){ return '<option value="'+r[v]+'">'+(r[l]||r.code||'?')+'</option>'; }).join('');
}
function fmt(n, d) { d = d == null ? 2 : d; return parseFloat(n||0).toLocaleString('en-BD',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function today() { return new Date().toISOString().split('T')[0]; }
function nowTs() { return Date.now().toString().slice(-8); }
function fd(form) { var d={}; form && form.querySelectorAll('[name]').forEach(function(el){ d[el.name] = el.type==='checkbox' ? el.checked : el.value; }); return d; }

function tbl(headers, rows, extra) {
  var s = '<div class="tbl-wrap"><table><thead><tr>' + headers.map(function(h){ return '<th>'+h+'</th>'; }).join('') + '</tr></thead><tbody>';
  if (!rows.length) s += '<tr><td colspan="'+headers.length+'" style="text-align:center;padding:24px;color:var(--tx3)">No data found</td></tr>';
  else s += rows.map(function(r){ return '<tr>' + r.map(function(c){ return '<td>'+c+'</td>'; }).join('') + '</tr>'; }).join('');
  s += '</tbody></table></div>';
  if (extra) s += extra;
  return s;
}

function rptTbl(headers, rows) {
  return '<div style="padding:10px">' + tbl(headers, rows) +
    '<div style="display:flex;gap:8px;margin-top:10px;align-items:center">' +
    '<button class="btn btn-b btn-sm" onclick="window.print()">&#x1F5A8; Print</button>' +
    '<button class="btn btn-s btn-sm" onclick="exportCSV()">&#x1F4E5; Export CSV</button>' +
    '<span style="font-size:12px;color:var(--tx3);margin-left:8px">' + rows.length + ' records</span>' +
    '</div></div>';
}

function exportCSV() {
  var table = document.querySelector('.report-area table');
  if (!table) { toast('No data to export','wrn'); return; }
  var rows = [];
  table.querySelectorAll('tr').forEach(function(tr){
    rows.push(Array.from(tr.querySelectorAll('th,td')).map(function(td){ return '"'+td.textContent.trim().replace(/"/g,'""')+'"'; }).join(','));
  });
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(rows.join('\n'));
  a.download = 'report_' + Date.now() + '.csv';
  a.click();
  toast('Exported!','ok');
}

function badge(status, labels) {
  labels = labels || { active:'bg', inactive:'br', paid:'bg', unpaid:'br', partial:'ba', pending:'ba', confirmed:'bg', approved:'bg', rejected:'br', completed:'bg', cancelled:'br', received:'bb' };
  return '<span class="b ' + (labels[status]||'bx') + '">' + status + '</span>';
}

function calcLine(qty, price, discPct, vatPct) {
  var sub = parseFloat(qty||0) * parseFloat(price||0);
  var disc = sub * (parseFloat(discPct||0)/100);
  var vat = (sub - disc) * (parseFloat(vatPct||0)/100);
  return { sub: sub, disc: disc, vat: vat, total: sub - disc + vat };
}

var CFG_MAP = {
  'item-type':'/inventory/item-groups','item-group':'/inventory/item-groups',
  'item-cat':'/inventory/item-categories','item-brand':'/inventory/item-brands',
  'item-model':'/inventory/item-brands','unit-info':'/inventory/units',
  'leave-cats':'/hr/leave/types','leave-type':'/hr/leave/types',
  'supplier-group':'/supplier/','define-holidays':'/hr/leave/holidays',
  'salary-grade':'/hr/grades','allowance-info':'/hr/departments',
  'deduction-info':'/hr/departments','loan-type':'/hr/departments',
};

async function loadCfgData(id) {
  var tbody = document.getElementById('cfg-'+id);
  if (!tbody) return;
  var ep = CFG_MAP[id];
  var data = [];
  if (ep) {
    var r = await API.get(ep);
    if (r && r.data) data = r.data;
  }
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--tx3)"><div style="font-size:24px;margin-bottom:6px">&#x2699;&#xFE0F;</div>No records. Add your first entry.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(function(r,i) {
    return '<tr><td>'+(i+1)+'</td><td><code style="font-family:var(--mono);font-size:11px;color:var(--am)">'+(r.code||'—')+'</code></td><td><strong>'+(r.name||r.full_name||'—')+'</strong></td><td>'+badge(r.is_active!==false?'active':'inactive')+'</td><td><button class="btn btn-s btn-sm">&#x270F;</button> <button class="btn btn-d btn-sm">&#x1F5D1;</button></td></tr>';
  }).join('');
}

function filterCfg(id, q) {
  var rows = document.querySelectorAll('#cfg-'+id+' tr');
  q = q.toLowerCase();
  rows.forEach(function(r){ r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
}
function openCfgAdd(id) { toast('Add new ' + id, 'inf'); }

// ── ATTACH PAGE EVENTS (called after every page render) ──────
function attachPageEvents(item) {
  setTimeout(function() {
    // Fill any dropdowns that reference cache

  '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="color:var(--tx3)">VAT:</span><span id="'+prefix+'-vat">\u09F30.00</span></div>' +

  '</div></div>';
}

var _lineCounters = {};
function addLine(prefix, itemOpts, showDel) {
  if (!_lineCounters[prefix]) _lineCounters[prefix] = 0;
  var i = _lineCounters[prefix]++;
  var tbody = document.getElementById(prefix+'-body'); if (!tbody) return;
  var inp = function(n,w,ri,extra){ return '<input type="number" name="'+prefix+'_'+n+'_'+i+'" value="'+ri+'" style="width:'+w+'px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:5px 7px;font-size:12px;text-align:right" oninput="recalcLine(\''+prefix+'\','+i+')"'+(extra||'')+' />'; };
  tbody.insertAdjacentHTML('beforeend',
    '<tr id="'+prefix+'-r-'+i+'">' +
    '<td>'+(i+1)+'</td>' +
    '<td><select name="'+prefix+'_item_'+i+'" style="width:180px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:5px 8px;font-size:12px" onchange="onItemSelect(\''+prefix+'\','+i+',this)">'+sopts(C.items,'id','name','Select item...')+'</select></td>' +
    '<td>'+inp('qty',65,1)+'</td>' +
    '<td>'+inp('price',90,0)+'</td>' +
    '<td>'+inp('disc',55,0)+'</td>' +
    '<td>'+inp('vat',55,0)+'</td>' +
    '<td id="'+prefix+'-amt-'+i+'" style="text-align:right;font-weight:600;color:var(--gn)">\u09F30.00</td>' +
    (showDel ? '<td><button type="button" onclick="removeLine(\''+prefix+'\','+i+')" class="btn btn-d btn-sm">&#x2715;</button></td>' : '') +
    '</tr>'
  );
}
function onItemSelect(prefix, idx, sel) {
  var it = C.items.find(function(i){ return i.id===sel.value; });
  if (!it) return;
  var p = document.querySelector('[name="'+prefix+'_price_'+idx+'"]');
  if (p) { p.value = it.selling_price||it.purchase_price||0; recalcLine(prefix, idx); }
}
function recalcLine(prefix, idx) {
  var g = function(n){ return parseFloat((document.querySelector('[name="'+prefix+'_'+n+'_'+idx+'"]')||{}).value||0); };
  var r = calcLine(g('qty'), g('price'), g('disc'), g('vat'));
  var el = document.getElementById(prefix+'-amt-'+idx); if(el) el.textContent = '\u09F3'+fmt(r.total);
  recalcTotals(prefix);
}
function recalcTotals(prefix) {
  var sub=0, vat=0, disc=0;
  document.querySelectorAll('[id^="'+prefix+'-amt-"]').forEach(function(el){ sub += parseFloat(el.textContent.replace('\u09F3','').replace(/,/g,'')||0); });
  var s=document.getElementById(prefix+'-sub'), vE=document.getElementById(prefix+'-vat'), dE=document.getElementById(prefix+'-disc'), t=document.getElementById(prefix+'-tot');
  if(s) s.textContent='\u09F3'+fmt(sub); if(t) t.textContent='\u09F3'+fmt(sub);
}
function removeLine(prefix, idx) { var r=document.getElementById(prefix+'-r-'+idx); if(r) r.remove(); recalcTotals(prefix); }

function getLines(prefix) {
  var lines = [];
  document.querySelectorAll('[id^="'+prefix+'-r-"]').forEach(function(row){
    var idx = row.id.replace(prefix+'-r-','');
    var itemId = (document.querySelector('[name="'+prefix+'_item_'+idx+'"]')||{}).value;
    if (!itemId) return;
    lines.push({
      item_id: itemId,
      quantity: parseFloat((document.querySelector('[name="'+prefix+'_qty_'+idx+'"]')||{}).value||1),
      unit_price: parseFloat((document.querySelector('[name="'+prefix+'_price_'+idx+'"]')||{}).value||0),
      discount_pct: parseFloat((document.querySelector('[name="'+prefix+'_disc_'+idx+'"]')||{}).value||0),
      vat_pct: parseFloat((document.querySelector('[name="'+prefix+'_vat_'+idx+'"]')||{}).value||0),
      ordered_qty: parseFloat((document.querySelector('[name="'+prefix+'_qty_'+idx+'"]')||{}).value||1),
    });
  });
  return lines;
}

function addVLine() {
  var i = _vlCnt++;
  document.getElementById('vl-body').insertAdjacentHTML('beforeend',
    '<tr id="vl-'+i+'"><td><select name="vl_acc_'+i+'" id="vl-acc-'+i+'" style="width:100%;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:6px 8px;font-size:12px">'+(C.coaOpts||'<option value="">Select account...</option>')+'</select></td>'+
    '<td><input type="number" name="vl_dr_'+i+'" value="0" step="0.01" style="width:110px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:5px 8px;font-size:12px;text-align:right" oninput="vCalc()"/></td>'+

    '<td><input name="vl_n_'+i+'" style="width:140px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:5px 8px;font-size:12px"/></td>'+
    '<td><button type="button" onclick="this.closest(\'tr\').remove();vCalc()" class="btn btn-d btn-sm">&#x2715;</button></td></tr>');
}
function vCalc() {
  var dr=0,cr=0;
  document.querySelectorAll('[name^="vl_dr_"]').forEach(function(el){ dr+=parseFloat(el.value||0); });
  document.querySelectorAll('[name^="vl_cr_"]').forEach(function(el){ cr+=parseFloat(el.value||0); });
  var diff=Math.abs(dr-cr);
  var dE=document.getElementById('v-dr'),cE=document.getElementById('v-cr'),difE=document.getElementById('v-diff');
  if(dE)dE.textContent='\u09F3'+fmt(dr);if(cE)cE.textContent='\u09F3'+fmt(cr);
  if(difE){difE.textContent='\u09F3'+fmt(diff);difE.style.color=diff<0.01?'var(--gn)':'var(--rd)';}
}
async function loadCOA() {
  var r = await API.get('/accounts/chart-of-accounts');
  if (r&&r.data) {
    C.coaOpts = sopts(r.data,'id','account_name');
    document.querySelectorAll('[name^="vl_acc_"]').forEach(function(sel){ sel.innerHTML = C.coaOpts; });
  }
}
async function submitVoucher() {
  var dr=0,cr=0;
  document.querySelectorAll('[name^="vl_dr_"]').forEach(function(el){ dr+=parseFloat(el.value||0); });
  document.querySelectorAll('[name^="vl_cr_"]').forEach(function(el){ cr+=parseFloat(el.value||0); });
  if (Math.abs(dr-cr)>0.01) { toast('Debit and Credit must balance!','err'); return; }
  var lines=[];
  document.querySelectorAll('[id^="vl-"]').forEach(function(row){
    var idx=row.id.replace('vl-','');
    var acc=(document.querySelector('[name="vl_acc_'+idx+'"]')||{}).value;
    if(!acc)return;
    lines.push({account_id:acc,debit_amount:parseFloat((document.querySelector('[name="vl_dr_'+idx+'"]')||{}).value||0),credit_amount:parseFloat((document.querySelector('[name="vl_cr_'+idx+'"]')||{}).value||0),narration:(document.querySelector('[name="vl_n_'+idx+'"]')||{}).value||''});
  });
  if(!lines.length){toast('Add account lines','wrn');return;}
  var res=await API.post('/accounts/vouchers',{voucher_date:(document.querySelector('[name="voucher_date"]')||{}).value||today(),voucher_type:(document.querySelector('[name="voucher_type"]')||{}).value||'journal',narration:(document.querySelector('[name="narration"]')||{}).value||'',lines:lines});
  if(res&&res.success){toast('Voucher posted: '+res.voucher_no,'ok');}
  else if(!res){toast('Posted (demo)','ok');}
}

function rptFilters(filters, btnFn) {
  return '<div class="report-filters">' +
    filters.map(function(f) {
      if (f.type==='date') return '<div class="fg" style="margin:0"><label>'+f.label+'</label><input type="date" id="'+f.id+'" value="'+(f.val||today())+'"/></div>';
      if (f.type==='month') return '<div class="fg" style="margin:0"><label>'+f.label+'</label><select id="'+f.id+'">'+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map(function(m,i){ return '<option value="'+(i+1)+'"'+(i===new Date().getMonth()?' selected':'')+'">'+m+'</option>'; }).join('')+'</select></div>';
      if (f.type==='year') return '<div class="fg" style="margin:0"><label>'+f.label+'</label><input type="number" id="'+f.id+'" value="'+new Date().getFullYear()+'" style="width:90px"/></div>';
      if (f.type==='select') return '<div class="fg" style="margin:0;min-width:160px"><label>'+f.label+'</label><select id="'+f.id+'"><option value="">All</option></select></div>';
      return '';
    }).join('') +
    '<button class="btn btn-p" onclick="'+btnFn+'()">&#x1F50D; Generate</button>' +
    '<button class="btn btn-b btn-sm" onclick="window.print()">&#x1F5A8; Print</button>' +
    '<button class="btn btn-s btn-sm" onclick="exportCSV()">&#x1F4E5; Export</button>' +
  '</div>' +
  '<div class="report-area" id="reportArea"><div class="work-placeholder"><div class="wp-icon">&#x1F4CA;</div><h3>Report Ready</h3><p style="font-size:13px;margin-top:6px">Set filters and click Generate.</p><button class="btn btn-p" style="margin-top:16px" onclick="'+btnFn+'()">Generate Report</button></div></div>';
}

async function prepareSalary() {
  var month=(document.getElementById('rpt-month')||{}).value||new Date().getMonth()+1;
  var year=(document.getElementById('rpt-year')||{}).value||new Date().getFullYear();
  var res=await API.post('/hr/payroll/prepare',{month:parseInt(month),year:parseInt(year)});

  else if(!res){toast('Prepared (demo)','ok');genSalaryReport();}
}

async function loadJCList() {
  var jcList=document.getElementById('jc-list'); if(!jcList)return;
  var r=await API.get('/service/job-cards',{status:'received'});
  var data=(r&&r.data)?r.data:Array.from({length:5},function(_,i){ return {job_card_no:'JC-00'+(i+1),customers:{name:'Customer '+(i+1),phone:'017000000'+i},vehicle_model:'Honda CB150R',vehicle_reg_no:'DHA-HA-100'+i,status:i===2?'in_progress':'received',job_date:today()}; });
  if (!data.length) { jcList.innerHTML='<div style="text-align:center;padding:24px;color:var(--tx3)">No active job cards</div>'; return; }
  jcList.innerHTML = data.map(function(jc){
    return '<div style="background:var(--bg3);border:1px solid var(--br);border-radius:10px;padding:12px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><code style="font-family:var(--mono);color:var(--tl);font-size:12px">'+jc.job_card_no+'</code>'+badge(jc.status||'received',{received:'bb',in_progress:'ba',waiting_parts:'br',completed:'bg'})+'</div><div style="font-size:13px;font-weight:600">'+(jc.customers&&jc.customers.name||'—')+'</div><div style="font-size:12px;color:var(--tx3)">'+(jc.vehicle_model||'—')+' &bull; '+(jc.vehicle_reg_no||'—')+'</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">'+jc.job_date+'</div></div>';
  }).join('');

async function submitJC() {
  var form=document.getElementById('frm-jc'); if(!form) return;
  var data=fd(form);
  if(!data.job_date||!data.customer_id||!data.complaint){toast('Date, Customer, Complaint required','wrn');return;}
  var res=await API.post('/service/job-cards',data);
  if(res&&res.success){toast('Job Card: '+res.job_card_no,'ok');loadJCList();}
  else if(!res){toast('Created (demo)','ok');loadJCList();}
}

async function submitBOM(){
  var finItem=(document.querySelector('[name="finished_item_id"]')||{}).value;
  if(!finItem){toast('Select finished product','wrn');return;}
  var items=[];
  document.querySelectorAll('[id^="bomr-"]').forEach(function(row){
    var idx=row.id.replace('bomr-','');
    var comp=(document.querySelector('[name="bom_comp_'+idx+'"]')||{}).value;
    if(!comp)return;
    items.push({component_item_id:comp,quantity:parseFloat((document.querySelector('[name="bom_qty_'+idx+'"]')||{}).value||1),waste_percentage:parseFloat((document.querySelector('[name="bom_waste_'+idx+'"]')||{}).value||0)});
  });
  if(!items.length){toast('Add components','wrn');return;}
  var res=await API.post('/production/bom',{finished_item_id:finItem,bom_version:(document.querySelector('[name="bom_version"]')||{}).value||'1.0',output_qty:parseFloat((document.querySelector('[name="output_qty"]')||{}).value||1),effective_from:(document.querySelector('[name="effective_from"]')||{}).value||today(),items:items});
  if(res&&res.success){toast('BOM saved: '+res.bom_no,'ok');}else if(!res){toast('Saved (demo)','ok');}
}

function calcInstall(){
  var tot=parseFloat((document.querySelector('[name="total_amount"]')||{}).value||0);
  var dp=parseFloat((document.querySelector('[name="down_payment"]')||{}).value||0);
  var n=parseInt((document.querySelector('[name="total_installments"]')||{}).value||12);
  var rate=parseFloat((document.querySelector('[name="interest_rate"]')||{}).value||0);
  var fin=tot-dp;
  var interest=fin*(rate/100)*(n/12);
  var totalPay=fin+interest;
  var monthly=n>0?totalPay/n:0;
  var cF=document.getElementById('cs-fin'),cM=document.getElementById('cs-monthly'),cT=document.getElementById('cs-total-pay');
  if(cF)cF.textContent='\u09F3'+fmt(fin);if(cM)cM.textContent='\u09F3'+fmt(monthly);if(cT)cT.textContent='\u09F3'+fmt(totalPay);
}
async function submitCS(){
  var form=document.getElementById('frm-cs');if(!form)return;
  var data=fd(form);
  if(!data.customer_id||!data.total_amount||!data.total_installments){toast('Required fields missing','wrn');return;}
  data.total_amount=parseFloat(data.total_amount);data.down_payment=parseFloat(data.down_payment||0);data.total_installments=parseInt(data.total_installments);data.interest_rate=parseFloat(data.interest_rate||0);
  var res=await API.post('/credit-sales/',data);
  if(res&&res.success){toast('CS created! Monthly: \u09F3'+fmt(res.installment_amount),'ok');loadCSList();}
  else if(!res){toast('Created (demo)','ok');loadCSList();}
}

async function runProcess(id) {

async function loadCOAList(){
  var tbody=document.getElementById('coa-list');if(!tbody)return;
  var r=await API.get('/accounts/chart-of-accounts');
  var data=(r&&r.data)?r.data:Array.from({length:6},function(_,i){ return {account_code:'100'+(i+1),account_name:'Account '+(i+1),account_type:i%2===0?'asset':'expense',opening_balance:i*1000}; });
  tbody.innerHTML=data.map(function(a){ return '<tr><td><code style="font-family:var(--mono);font-size:11px;color:var(--am)">'+a.account_code+'</code></td><td>'+a.account_name+'</td><td><span class="b '+(a.account_type==='asset'?'bg':a.account_type==='expense'?'br':'bb')+'">'+a.account_type+'</span></td><td style="text-align:right">\u09F3'+fmt(a.opening_balance)+'</td></tr>'; }).join('');
}

async function submitCOA(){
  var form=document.getElementById('frm-coa');if(!form)return;
  var data=fd(form);
  if(!data.account_code||!data.account_name){toast('Code and Name required','wrn');return;}
  var res=await API.post('/accounts/chart-of-accounts',data);
  if(res&&res.success){toast('Account saved!','ok');loadCOAList();}else if(!res){toast('Saved (demo)','ok');loadCOAList();}
}

// Generic report page builder
function rpgFilterSimple(item, category) {
  var months = '<option value="">All Months</option>' + ['January','February','March','April','May','June','July','August','September','October','November','December'].map(function(m,i){ return '<option value="'+(i+1)+'">'+m+'</option>'; }).join('');
  return '<div class="report-filters">' +
  '<div class="fg" style="margin:0"><label>From Date</label><input type="date" id="rpt-from" value="'+new Date().toISOString().slice(0,8)+'01"/></div>' +
  '<div class="fg" style="margin:0"><label>To Date</label><input type="date" id="rpt-to" value="'+today()+'"/></div>' +
  '<div class="fg" style="margin:0;min-width:130px"><label>Month</label><select id="rpt-month">'+months+'</select></div>' +
  '<div class="fg" style="margin:0;min-width:90px"><label>Year</label><input type="number" id="rpt-year" value="'+new Date().getFullYear()+'" style="width:90px"/></div>' +
  '<button class="btn btn-p" onclick="loadGenericReport()">&#x1F50D; Generate</button>' +
  '<button class="btn btn-b btn-sm" onclick="window.print()">&#x1F5A8;&#xFE0F; Print</button>' +
  '<button class="btn btn-s btn-sm" onclick="exportRptCSV()">&#x1F4E5; Export</button>' +
  '</div>' +
  '<div class="report-area" id="reportArea">' +
  '<div class="work-placeholder"><div class="wp-icon">&#x1F4CA;</div><h3>'+item.label+'</h3>' +
  '<p style="font-size:13px;margin-top:6px;color:var(--tx3)">Select date range and click Generate to load the report.</p>' +
  '<button class="btn btn-p" style="margin-top:14px" onclick="loadGenericReport()">Generate Report</button></div>' +
  '</div>';
}

// ── UTILITY FUNCTIONS ──────────────────────────────────────
function itemsTable(canEdit, prefix) {
  return '<div class="card" style="margin-top:10px"><div class="sec-hd"><h3>&#x1F4E6; Items</h3>' +
  (canEdit?'<button type="button" class="btn btn-p btn-sm" onclick="addGenRow(\''+prefix+'\')">+ Add</button>':'') +
  '</div><div class="tbl-wrap"><table><thead><tr><th>#</th><th style="min-width:160px">Item</th><th>Qty</th><th>Unit</th><th>Price</th><th>Amount</th>'+(canEdit?'<th></th>':'')+'</tr></thead>' +
  '<tbody id="'+prefix+'-body"><tr id="'+prefix+'-r0"><td>1</td>' +
  '<td><select style="width:160px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 8px;font-size:12px" data-fill="items"><option value="">Select...</option></select></td>' +
  '<td><input type="number" value="1" style="width:65px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 6px;font-size:12px;text-align:right" oninput="calcGenLine(this)"/></td>' +
  '<td><select style="width:70px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 6px;font-size:12px"><option>PCS</option><option>KG</option><option>LTR</option></select></td>' +
  '<td><input type="number" value="0" style="width:85px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 6px;font-size:12px;text-align:right" oninput="calcGenLine(this)"/></td>' +
  '<td style="font-weight:600;color:var(--gn);text-align:right">&#x09F3;0.00</td>' +
  (canEdit?'<td><button type="button" onclick="this.closest(\'tr\').remove()" class="btn btn-d btn-sm">&#x2715;</button></td>':'') +
  '</tr></tbody></table></div></div>';
}

var _genRowCount = {};
function addGenRow(prefix) {
  if (!_genRowCount[prefix]) _genRowCount[prefix] = 1;
  var i = _genRowCount[prefix]++;
  var body = document.getElementById(prefix+'-body');
  if (!body) return;
  body.insertAdjacentHTML('beforeend','<tr id="'+prefix+'-r'+i+'"><td>'+(i+1)+'</td><td><select style="width:160px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 8px;font-size:12px">'+sopts(C.items,'id','name')+'</select></td><td><input type="number" value="1" style="width:65px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 6px;font-size:12px;text-align:right" oninput="calcGenLine(this)"/></td><td><select style="width:70px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 6px;font-size:12px"><option>PCS</option><option>KG</option><option>LTR</option></select></td><td><input type="number" value="0" style="width:85px;background:var(--bg3);border:1px solid var(--br2);border-radius:6px;color:var(--tx);padding:4px 6px;font-size:12px;text-align:right" oninput="calcGenLine(this)"/></td><td style="font-weight:600;color:var(--gn);text-align:right">&#x09F3;0.00</td><td><button type="button" onclick="this.closest(\'tr\').remove()" class="btn btn-d btn-sm">&#x2715;</button></td></tr>');
}

function calcGenLine(input) {
  var row = input.closest('tr');
  if (!row) return;
  var inputs = row.querySelectorAll('input[type="number"]');
  var qty = parseFloat(inputs[0] ? inputs[0].value : 0);
  var price = parseFloat(inputs[1] ? inputs[1].value : 0);
  var total = qty * price;
  var cells = row.querySelectorAll('td');
  if (cells[5]) cells[5].textContent = '৳'+fmt(total);
}

function demoRows() {
  var rows = Array.from(arguments);
  return rows.map(function(r,i){ return '<tr>'+['<td>'+(i+1)+'</td>'].concat(Array.from(r).map(function(c){ return '<td>'+c+'</td>'; })).join('')+'</tr>'; }).join('');
}

function calcFuelCost() {
  var qty = parseFloat(document.querySelector('[name="quantity"]')&&document.querySelector('[name="quantity"]').value||0);
  var rate = parseFloat(document.querySelector('[name="rate"]')&&document.querySelector('[name="rate"]').value||0);
  var total = qty * rate;
  var el = document.getElementById('fuel-total');
  if (el) el.value = total.toFixed(2);
}

function genericSave(id) {
  toast('Saving '+id+'...', 'inf');
  setTimeout(function(){ toast('Saved successfully!', 'ok'); }, 500);
}

function approveProcurement() {
  if (!confirm('Approve this procurement?')) return;
  var sel = document.querySelector('[name="status"]');
  if (sel) sel.value = 'approved';
  toast('Procurement approved!', 'ok');
}

function submitProdOrder() {
  toast('Production order created!', 'ok');
}

async function loadGenericReport() {
  var area = document.getElementById('reportArea');
  if (!area) return;
  area.innerHTML = '<div style="text-align:center;padding:28px;color:var(--tx3)"><div style="font-size:28px">&#x231B;</div>Loading...</div>';
  await new Promise(function(r){ setTimeout(r, 350); });
  var from = document.getElementById('rpt-from')&&document.getElementById('rpt-from').value;
  var to = document.getElementById('rpt-to')&&document.getElementById('rpt-to').value;
  // Generate demo data
  var data = Array.from({length:10}, function(_,i) {
    return [i+1, 'REF-00'+(i+1), 'Record '+(i+1), '2025-0'+((i%9)+1)+'-01', '&#x09F3;'+fmt((i+1)*Math.floor(Math.random()*50000+1000)), badge(['active','pending','paid'][i%3])];
  });
  area.innerHTML = rptTbl(['SL','Reference','Description','Date','Amount','Status'], data);
  toast('Report generated', 'ok');
}

function exportRptCSV() {
  var tbl = document.querySelector('.report-area table');
  if (!tbl) { toast('No data to export','wrn'); return; }
  var rows = [];
  tbl.querySelectorAll('tr').forEach(function(tr) {
    rows.push(Array.from(tr.querySelectorAll('th,td')).map(function(td){ return '"'+td.textContent.replace(/"/g,'""')+'"'; }).join(','));
  });
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(rows.join('\n'));
  a.download = 'report_'+Date.now()+'.csv';
  a.click();
  toast('Exported!', 'ok');
}

// ── FINAL OVERRIDES ────────────────────────────────────────
function attachPageEvents(item) {
  setTimeout(function() {
    // Auto-fill dropdowns from cache
    document.querySelectorAll('[data-fill="customers"]').forEach(function(s){ if(s.children.length<=1&&C.customers.length) s.innerHTML=sopts(C.customers); });
    document.querySelectorAll('[data-fill="suppliers"]').forEach(function(s){ if(s.children.length<=1&&C.suppliers.length) s.innerHTML=sopts(C.suppliers); });
    document.querySelectorAll('[data-fill="items"]').forEach(function(s){ if(s.children.length<=1&&C.items.length) s.innerHTML=sopts(C.items,'id','name'); });
    document.querySelectorAll('[data-fill="employees"]').forEach(function(s){ if(s.children.length<=1&&C.employees.length) s.innerHTML=sopts(C.employees,'id','full_name'); });
    document.querySelectorAll('[data-fill="departments"]').forEach(function(s){ if(s.children.length<=1&&C.departments.length) s.innerHTML=sopts(C.departments); });
    document.querySelectorAll('[data-fill="designations"]').forEach(function(s){ if(s.children.length<=1&&C.designations.length) s.innerHTML=sopts(C.designations); });
    // Form-specific onload
    var fn = window['_onload_'+item.id.replace(/-/g,'_')];
    if (fn) fn();
  }, 100);
}

function loadReport() {
  var from = document.getElementById('rpt-from')&&document.getElementById('rpt-from').value;
  var to   = document.getElementById('rpt-to')&&document.getElementById('rpt-to').value;
  var area = document.getElementById('reportArea');
  if (!area) return;
  area.innerHTML = '<div style="text-align:center;padding:32px;color:var(--tx3)"><div style="font-size:30px;margin-bottom:8px">&#x231B;</div>Generating...</div>';
  setTimeout(function() {
    var fn = window['_rpt_'+S.currentPage];
    if (fn) { fn(from, to); return; }
    area.innerHTML = rptTbl(['SL','Reference','Description','Date','Amount','Status'],
      Array.from({length:8},function(_,i){ return [i+1,'REF-00'+(i+1),'Record '+(i+1),'2025-0'+((i%9)+1)+'-01','&#x09F3;'+fmt((i+1)*12500),badge('active')]; }));
    toast('Report generated','ok');
  }, 400);
}

function printReport() { window.print(); }
function saveForm(itemId) {
  var form = document.getElementById('frm-'+itemId);
  if (!form) { toast('Saved (demo mode)','ok'); return; }
  submitGenericForm(itemId, form);
}
function clearForm() {
  document.querySelectorAll('.erp-form input:not([readonly]), .erp-form select, .erp-form textarea').forEach(function(el){
    if(el.type==='date') el.value=today();
    else if(el.type==='checkbox') el.checked=false;
    else el.value='';
  });
  toast('Form cleared','inf');
}
function openAddModal(id) { toast('Add new: '+id,'inf'); }
function exportReport() { exportRptCSV(); }
