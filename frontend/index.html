<style>
:root{--or:#FF6B35;--am:#F7931E;--gd:#FFD23F;--tl:#00D4AA;--bl:#3B82F6;--pu:#8B5CF6;--gn:#22C55E;--rd:#EF4444;--pk:#EC4899;--cy:#06B6D4;--in:#6366F1;--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--or);border-radius:2px}

/* LOGIN */
#loginPage{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(255,107,53,.08),transparent 60%),radial-gradient(ellipse 60% 50% at 70% 60%,rgba(255,210,63,.05),transparent 60%)}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,53,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,53,.04) 1px,transparent 1px);background-size:50px 50px}
.lbox{position:relative;z-index:1;width:460px;max-width:95vw;background:var(--bg2);border:1px solid var(--br2);border-radius:24px;padding:40px;box-shadow:var(--sh)}
.l-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.l-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--or),var(--am));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;font-family:var(--font)}

.lf select option{background:var(--bg2)}

/* APP */

.shell{display:flex;flex:1;overflow:hidden}

.s-search input:focus{border-color:var(--or)}
.sidebar.col .s-search{display:none}

/* NAV */
.s-nav{flex:1;overflow-y:auto;padding:4px 0}

.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:10}

/* MAIN CONTENT */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* PAGES */
.page{display:none;animation:pgIn .2s ease}

/* WELCOME PAGE */
.welcome-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}

.wcard:hover{transform:translateY(-2px);box-shadow:var(--sh);border-color:var(--br2)}

/* GENERIC MODULE PAGE */

.fn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:11px;border:1px solid var(--br)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}

td strong{color:var(--tx);font-weight:600}

/* FORMS */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.2s;font-family:var(--font)}

.btn-p:hover{transform:translateY(-1px);opacity:.9}
.btn-s{background:var(--bg3);color:var(--tx2);border:1px solid var(--br2)}
.btn-s:hover{background:var(--bg4);color:var(--tx)}

.b{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:14px}
.bg{background:rgba(34,197,94,.12);color:var(--gn)}
.br{background:rgba(239,68,68,.12);color:var(--rd)}
.ba{background:rgba(247,147,30,.12);color:var(--am)}
.bb{background:rgba(59,130,246,.12);color:var(--bl)}

.bx{background:var(--bg4);color:var(--tx3)}
.bo{background:rgba(255,107,53,.12);color:var(--or)}

.stats-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.sp{flex:1;min-width:110px;background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:12px 14px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:12px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* TABS */

.t-it{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx3);transition:.12s;white-space:nowrap}
.t-it:hover{color:var(--tx)}
.t-it.act{background:var(--bg2);color:var(--or);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.t-panel{display:none}.t-panel.act{display:block;animation:pgIn .2s ease}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--br2);border-radius:16px;padding:22px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:pgIn .2s ease;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px}
.modal-close:hover{color:var(--rd)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--br)}

/* TOAST */
#toasts{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .3s ease;min-width:220px;max-width:320px;background:var(--bg2)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{border:1px solid rgba(34,197,94,.3)}.toast.err{border:1px solid rgba(239,68,68,.3)}.toast.inf{border:1px solid rgba(59,130,246,.3)}.toast.wrn{border:1px solid rgba(247,147,30,.3)}

/* REPORT AREA */
.report-filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;background:var(--bg3);border-radius:11px;padding:14px;border:1px solid var(--br)}
.report-area{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:16px;min-height:300px}

@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:50;transition:left .3s}.sidebar.mob-open{left:0}
  .welcome-grid{grid-template-columns:1fr 1fr}.fn-grid{grid-template-columns:1fr}
  .fgrid,.fgrid3{grid-template-columns:1fr}
}

/* Profile menu */
.pmenu-item{padding:7px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);transition:.12s}
.pmenu-item:hover{background:var(--bg3);color:var(--tx)}

/* Print styles */
@media print {
  .sidebar,.topbar,.tb-actions,.col-btn,.s-search,.fn-grid,.mod-header .btn,
  #toasts,.modal-ov,button:not(.print-keep){display:none!important}
  body,.main-wrap,.content{margin:0;padding:0;background:#fff;color:#000}
  .tbl-wrap{overflow:visible}
  table{width:100%;font-size:11px}
  thead th{background:#1a3a6b!important;color:#fff!important;-webkit-print-color-adjust:exact}
  .print-header{display:block!important}
  @page{margin:15mm}
}
.print-header{display:none}

/* Barcode display */
.barcode-svg{font-family:var(--mono);letter-spacing:2px}
.barcode-bars{display:flex;align-items:flex-end;gap:1px;height:60px}
.barcode-bars span{background:#000;width:2px}

/* ID Card */
.id-card{width:242px;height:153px;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:Arial,sans-serif}

/* Attendance status colors */
.att-present{background:rgba(34,197,94,.12);color:var(--gn)}
.att-absent{background:rgba(239,68,68,.12);color:var(--rd)}
.att-late{background:rgba(247,147,30,.12);color:var(--am)}

/* Authorization badge */
.auth-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700}
.auth-pending{background:rgba(247,147,30,.15);color:var(--am);border:1px solid rgba(247,147,30,.3)}
.auth-approved{background:rgba(34,197,94,.15);color:var(--gn);border:1px solid rgba(34,197,94,.3)}
.auth-rejected{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3)}

/* Logo CSS */
.s-logo img{transition:opacity .2s}
.sidebar.col .s-logo img{width:34px;height:34px;object-fit:contain}
.l-logo img{filter:drop-shadow(0 2px 8px rgba(0,0,0,.15))}

</style>
</head>

    // Count items
    var total = mc.sub.reduce((a,s)=>a+s.items.length,0);

    var mcEl = document.createElement('div');

    mcEl.setAttribute('data-id', mc.id);

      '<div class="mc-icon" style="background:'+mc.color+'22">'+mc.icon+'</div>'+

    var subCont = document.createElement('div');
    subCont.className = 'sub-menu';
    subCont.id = 'mc-sub-'+mc.id;
    mc.sub.forEach(function(sc){
      // Sub category
      var scEl = document.createElement('div');
      scEl.className = 'sm-item';
      scEl.setAttribute('data-id', sc.id);
      scEl.innerHTML =
        '<span>'+sc.icon+'</span>'+
        '<span>'+(S.lang==='bn'?sc.bn:sc.en)+'</span>'+
        '<span class="sm-arrow">▶</span>';
      scEl.onclick = function(e){ e.stopPropagation(); toggleSC(mc.id, sc.id, scEl); };
      subCont.appendChild(scEl);
      // Items container
      var itemCont = document.createElement('div');
      itemCont.className = 'ssm-list';
      itemCont.id = 'sc-items-'+sc.id;
      sc.items.forEach(function(item){
        var itemEl = document.createElement('div');
        itemEl.className = 'ssm-item';
        itemEl.setAttribute('data-id', item.id);
        var tc = TYPE_CONFIG[item.type]||TYPE_CONFIG.form;
        itemEl.innerHTML = '<span style="color:'+tc.color+';margin-right:4px;font-size:11px">'+tc.icon+'</span><span>'+(S.lang==='bn'?item.bn:item.label)+'</span>';
        itemEl.onclick = function(e){ e.stopPropagation(); showModule(mc, sc, item); };
        itemCont.appendChild(itemEl);
      });
      subCont.appendChild(itemCont);
    });
    nav.appendChild(subCont);
  });

function toggleMC(mcId, el){
  var sub = document.getElementById('mc-sub-'+mcId);
  var isOpen = sub.classList.contains('open');
  // Close all
  document.querySelectorAll('.sub-menu').forEach(s=>s.classList.remove('open'));
  document.querySelectorAll('.mc-item').forEach(m=>{m.classList.remove('act','open');});
  if(!isOpen){
    sub.classList.add('open');
    el.classList.add('act','open');
  }
}
function toggleSC(mcId, scId, el){
  var items = document.getElementById('sc-items-'+scId);
  var isOpen = items.classList.contains('open');
  // Close all sub-items in this mc
  var parent = document.getElementById('mc-sub-'+mcId);
  parent.querySelectorAll('.ssm-list').forEach(s=>s.classList.remove('open'));
  parent.querySelectorAll('.sm-item').forEach(s=>{s.classList.remove('act','open');});
  if(!isOpen){
    items.classList.add('open');
    el.classList.add('act','open');
  }
}

function filterMenus(query){
  if(!query.trim()){ buildNav(); return; }
  query = query.toLowerCase();
  var nav = document.getElementById('sNav');
  nav.innerHTML = '';
  ERP_MENU.forEach(function(mc){
    if(!mc.roles.includes(S.role)) return;
    mc.sub.forEach(function(sc){
      sc.items.forEach(function(item){
        if(item.label.toLowerCase().includes(query)||item.en.toLowerCase().includes(query)||item.bn.includes(query)){
          var itemEl = document.createElement('div');
          itemEl.className = 'sm-item';

            '<span>'+mc.icon+'</span>'+

var API_BASE = localStorage.getItem('erp_api_base') || 'https://api.saforatech.com/api';
var API_TOKEN = localStorage.getItem('erp_token') || null;

var API = {
  base: API_BASE,
  token: API_TOKEN,
  async req(method, path, data) {
    var headers = {'Content-Type':'application/json'};
    if(this.token) headers['Authorization'] = 'Bearer ' + this.token;
    var opts = {method, headers};
    if(data && method !== 'GET') opts.body = JSON.stringify(data);
    var url = this.base + path;
    if(data && method === 'GET') {
      var p = new URLSearchParams(Object.entries(data).filter(([k,v])=>v!=null&&v!==''));
      if(p.toString()) url += '?' + p;
    }
    try {
      var res = await fetch(url, opts);
      if(res.status === 401) { return null; }
      return await res.json();
    } catch(e) { return null; }
  },
  get(p,d){ return this.req('GET',p,d); },
  post(p,d){ return this.req('POST',p,d); },
  put(p,d){ return this.req('PUT',p,d); },
  del(p){ return this.req('DELETE',p); }
};

var C = {items:[],customers:[],suppliers:[],employees:[],departments:[],designations:[],grades:[],units:[]};

async function loadCache() {
  try {
    var [r1,r2,r3,r4,r5,r6,r7,r8] = await Promise.all([
      API.get('/hr/departments'), API.get('/hr/designations'),
      API.get('/inventory/items',{page:1,page_size:500}), API.get('/customer/',{page:1,page_size:500}),
      API.get('/supplier/',{page:1,page_size:500}), API.get('/hr/employees',{page:1,page_size:500}),
      API.get('/hr/grades'), API.get('/inventory/units')
    ]);
    if(r1?.data) C.departments=r1.data;
    if(r2?.data) C.designations=r2.data;
    if(r3?.data) C.items=r3.data;
    if(r4?.data) C.customers=r4.data;
    if(r5?.data) C.suppliers=r5.data;
    if(r6?.data) C.employees=r6.data;
    if(r7?.data) C.grades=r7.data;
    if(r8?.data) C.units=r8.data;
    // Re-fill all dropdowns
    document.querySelectorAll('[data-fill="customers"]').forEach(s=>s.innerHTML=sopts(C.customers));
    document.querySelectorAll('[data-fill="suppliers"]').forEach(s=>s.innerHTML=sopts(C.suppliers));
    document.querySelectorAll('[data-fill="items"]').forEach(s=>s.innerHTML=sopts(C.items,'id','name'));
    document.querySelectorAll('[data-fill="employees"]').forEach(s=>s.innerHTML=sopts(C.employees,'id','full_name'));
    document.querySelectorAll('[data-fill="departments"]').forEach(s=>s.innerHTML=sopts(C.departments));
  } catch(e) {}
}

function sopts(arr, val='id', lbl='name', ph='-- Select --') {
  return `<option value="">${ph}</option>` +
    (arr||[]).map(r=>`<option value="${r[val]||''}">${r[lbl]||r.code||''}</option>`).join('');
}
function fmt(n,d=2){ return parseFloat(n||0).toLocaleString('en-BD',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fd(form){
  var d={};
  if(!form) return d;
  form.querySelectorAll('[name]').forEach(el=>{
    if(el.type==='checkbox') d[el.name]=el.checked;
    else d[el.name]=el.value;

async function _apiLogin(email,pass) {
  try {
    var res=await fetch(API_BASE+'/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    if(res.ok){
      var data=await res.json();
      if(data.access_token){
        API_TOKEN=data.access_token;
        API.token=data.access_token;
        localStorage.setItem('erp_token',data.access_token);
        if(data.user){
          S.user.name=data.user.full_name||S.user.name;
          S.user.role=data.user.role||'general';
          S.role=data.user.role||'general';
          S.user.email=data.user.email;
          updateUserUI();
          updateProfileMenu();
        }
        toast('✅ Connected to server','ok');
        setTimeout(loadCache,500);
      }
    }
  }catch(e){}
}

  setTimeout(()=>{
    document.querySelectorAll('[data-fill="customers"]').forEach(s=>{if(s.children.length<=1&&C.customers.length) s.innerHTML=sopts(C.customers);});
    document.querySelectorAll('[data-fill="suppliers"]').forEach(s=>{if(s.children.length<=1&&C.suppliers.length) s.innerHTML=sopts(C.suppliers);});
    document.querySelectorAll('[data-fill="items"]').forEach(s=>{if(s.children.length<=1&&C.items.length) s.innerHTML=sopts(C.items,'id','name');});
    document.querySelectorAll('[data-fill="employees"]').forEach(s=>{if(s.children.length<=1&&C.employees.length) s.innerHTML=sopts(C.employees,'id','full_name');});
    document.querySelectorAll('[data-fill="departments"]').forEach(s=>{if(s.children.length<=1&&C.departments.length) s.innerHTML=sopts(C.departments);});
    document.querySelectorAll('[data-fill="designations"]').forEach(s=>{if(s.children.length<=1&&C.designations.length) s.innerHTML=sopts(C.designations);});
    var fn=window['_onload_'+item.id.replace(/-/g,'_')];
    if(fn) fn();
  },100);
}

// ── AUTHORIZATION ────────────────────────────────────────────
var AUTH_REQUIRED={
  'salary-process':['administrator'],'bonus-process':['administrator'],
  'pf-process':['administrator'],'single-voucher':['admin','administrator'],
};
var _origShowModule=showModule;
function showModule(mc,sc,item){
  var req=AUTH_REQUIRED[item.id];
  if(req&&!req.includes(S.role)){
    document.getElementById('pgTitle').textContent=item.label;
    document.getElementById('mainContent').innerHTML=`
    <div class="card" style="text-align:center;padding:40px">
      <div style="font-size:48px">🔐</div>
      <h3 style="margin:12px 0 8px">Authorization Required</h3>
      <p style="color:var(--tx3);font-size:13px">Required: <span class="b ba">${req.join(', ')}</span> · Your role: <span class="b bb">${S.role}</span></p>
      <button class="btn btn-s" style="margin-top:14px" onclick="renderWelcome()">← Dashboard</button>
    </div>`;
    return;
  }
  _origShowModule(mc,sc,item);
}

// ── GENERIC REPORT PAGE ──────────────────────────────────────
function rptPage(title,filterExtra=''){
  return `<div class="report-filters">
    <div class="fg" style="margin:0"><label>From Date</label><input type="date" id="rpt-from" value="${new Date().toISOString().slice(0,8)}01"/></div>
    <div class="fg" style="margin:0"><label>To Date</label><input type="date" id="rpt-to" value="${today()}"/></div>
    ${filterExtra}
    <button class="btn btn-p" onclick="loadReport()">🔍 Generate</button>
    <button class="btn btn-b btn-sm" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-s btn-sm" onclick="exportRptCSV()">📥 Export</button>
  </div>
  <div class="report-area" id="reportArea">
    <div class="work-placeholder"><div class="wp-icon">📊</div><h3>${title}</h3>
    <p style="font-size:13px;margin-top:6px;color:var(--tx3)">Select date range and click Generate.</p>
    <button class="btn btn-p" style="margin-top:14px" onclick="loadReport()">Generate</button></div>
  </div>`;
}
function loadReport(){
  var from=document.getElementById('rpt-from')?.value;
  var to=document.getElementById('rpt-to')?.value;
  var area=document.getElementById('reportArea');
  if(!area)return;
  area.innerHTML='<div style="text-align:center;padding:32px;color:var(--tx3)"><div style="font-size:30px">⏳</div>Loading...</div>';
  setTimeout(async()=>{
    var fn=window['_rpt_'+S.currentPage];
    if(fn){await fn(from,to);return;}
    area.innerHTML=rptTbl(['SL','Reference','Description','Date','Amount','Status'],
      Array.from({length:8},(_,i)=>[i+1,'REF-00'+(i+1),'Record '+(i+1),today(),'৳'+fmt((i+1)*12500),badge(['active','pending','paid'][i%3])]));
    toast('Report generated','ok');
  },400);
}
function printReport(){window.print();}
function exportReport(){exportRptCSV();}
function performSearch(){
  var q=(document.getElementById('searchInput')||{}).value||'';
  if(!q){toast('Enter search term','wrn');return;}
  var tbody=document.querySelector('#searchResults tbody');
  var results=[];
  ERP_MENU.forEach(mc=>mc.sub.forEach(sc=>sc.items.forEach(item=>{
    if((item.label||'').toLowerCase().includes(q.toLowerCase()||(item.bn||'').includes(q))) results.push({item,mc,sc});
  })));
  if(tbody) tbody.innerHTML=results.slice(0,20).map((r,i)=>`<tr><td>${i+1}</td><td><strong>${r.item.label}</strong></td><td><code style="font-size:11px">${r.item.id}</code></td><td>${r.item.type}</td><td>${r.mc.en} › ${r.sc.en}</td><td><button class="btn btn-s btn-sm" onclick="showModuleById('${r.mc.id}','${r.sc.id}','${r.item.id}')">Open</button></td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--tx3)">No results</td></tr>';
  toast(`Found ${results.length} results`,'ok');
}

// Tab helper
function swTab(prefix,idx){
  document.querySelectorAll(`#${prefix}-tabs .t-it`).forEach((t,i)=>t.classList.toggle('act',i===idx));
  document.querySelectorAll(`[id^="${prefix}-p"]`).forEach((p,i)=>p.classList.toggle('act',i===idx));
}

async function loadEmpList(q=''){
  var tbody=document.getElementById('emp-list-body');if(!tbody)return;
  var r=await API.get('/hr/employees',{page:1,page_size:20,search:q||null});
  var data=r?.data||Array.from({length:5},(_,i)=>({id:'x'+i,employee_code:'EMP-00'+(i+1),first_name:'Employee',last_name:i+1,departments:{name:'IT'},designations:{name:'Officer'},mobile_number:'0170000'+(i+1),employee_status:'active'}));
  tbody.innerHTML=data.map((e,i)=>`<tr>
    <td>${i+1}</td>
    <td><code style="font-family:var(--mono);color:var(--am);font-size:11px">${e.employee_code}</code></td>
    <td><strong>${e.first_name||''} ${e.last_name||''}</strong></td>
    <td>${e.departments?.name||'—'}</td>
    <td>${e.designations?.name||'—'}</td>
    <td>${e.mobile_number||'—'}</td>
    <td>${badge(e.employee_status||'active')}</td>
    <td><button class="btn btn-s btn-sm" onclick="">✏️</button><button class="btn btn-b btn-sm" onclick="genIdCard('${e.id}')">🪪</button></td>
  </tr>`).join('');
}
function searchEmp(q){clearTimeout(window._se);window._se=setTimeout(()=>loadEmpList(q),400);}
async function submitEmployee(){
  var form=document.getElementById('frm-emp-profile');if(!form)return;
  var data=fd(form);
  if(!data.employee_code||!data.first_name){toast('Employee Code and First Name required','wrn');return;}
  var createUser=document.getElementById('createUserAcc')?.checked;
  if(createUser){
    if(!data.user_email){toast('User email required','wrn');return;}
    if(!data.user_password||data.user_password.length<8){toast('Password min 8 chars','wrn');return;}
    if(data.user_password!==data.user_confirm){toast('Passwords do not match','wrn');return;}
  }
  var r=await API.post('/hr/employees',data);
  if(r?.success||r?.data||!r){
    toast('✅ Employee saved!','ok');
    addNotification('Employee Created',`${data.first_name} ${data.last_name||''} (${data.employee_code})`);
    if(createUser&&data.user_email){
      await API.post('/auth/users',{email:data.user_email,password:data.user_password,full_name:data.first_name+' '+(data.last_name||''),role:data.user_role||'general'});
      toast('✅ User account created!','ok');
    }
    loadEmpList();
  }
}

async function loadAttData(){

  var r=await API.get('/hr/attendance',{from_date:d,to_date:d});

  var p=data.filter(r=>r.status==='present').length;
  var cnt=document.getElementById('att-present-count');if(cnt)cnt.textContent=p+'/'+data.length+' Present';
  tbody.innerHTML=data.map((r,i)=>`<tr><td>${i+1}</td><td><strong>${r.employees?.first_name||''} ${r.employees?.last_name||''}</strong><br><code style="font-size:10px;color:var(--tx3)">${r.employees?.employee_code||'—'}</code></td><td>${r.in_time?String(r.in_time).slice(11,16)||r.in_time:'—'}</td><td>${r.out_time?String(r.out_time).slice(11,16)||r.out_time:'—'}</td><td>${badge(r.status)}</td><td>${r.working_hours||'—'}</td></tr>`).join('');

async function saveAttendance(){
  var form=document.getElementById('frm-att-upload');if(!form)return;
  var data=fd(form);
  if(!data.attendance_date){toast('Select date','wrn');return;}
  var r=await API.post('/hr/attendance',data);
  if(r?.success||!r){toast('✅ Saved!','ok');loadAttData();}
}
function previewAttFile(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=e.target.result.trim().split('\n').slice(1).map(r=>r.split(','));
    var tbody=document.getElementById('att-preview-body');if(!tbody)return;
    var matched=0;
    tbody.innerHTML=rows.slice(0,20).map(r=>{
      var code=r[0]?.trim();
      var found=C.employees.find(e=>e.employee_code===code);
      if(found)matched++;
      return `<tr><td><code style="font-family:var(--mono);color:var(--am)">${code||'?'}</code></td><td>${r[1]?.trim()||'—'}</td><td>${r[2]?.trim()||'—'}</td><td>${r[3]?.trim()||'—'}</td><td>${badge(r[4]?.trim()||'present')}</td><td><span class="b ${found?'bg':'br'}">${found?'✅':'❌'}</span></td></tr>`;
    }).join('');
    document.getElementById('att-preview').style.display='block';
    var st=document.getElementById('att-file-stats');if(st)st.textContent=rows.length+' rows, '+matched+' matched';
    window._attData=rows;
  };
  reader.readAsText(file);
}
async function importAttendance(){
  var rows=window._attData||[];if(!rows.length){toast('No data','wrn');return;}
  var ok=0;
  for(var row of rows){
    var code=row[0]?.trim();
    var emp=C.employees.find(e=>e.employee_code===code);
    if(!emp)continue;
    await API.post('/hr/attendance',{employee_id:emp.id,attendance_date:row[1]?.trim(),in_time:row[2]?.trim()||null,out_time:row[3]?.trim()||null,status:row[4]?.trim()||'present',is_manual:true});
    ok++;
  }
  toast('✅ Imported '+ok+' records!','ok');
  document.getElementById('att-preview').style.display='none';
  addNotification('Attendance Imported',ok+' records synced');
}
async function markOnline(type){
  var empId=document.getElementById('online-emp-id')?.value;
  if(!empId){toast('Select employee','wrn');return;}
  var result=document.getElementById('att-result');
  if(result)result.textContent='Getting location...';
  var location=null;
  try{
    await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>{location={lat:p.coords.latitude.toFixed(4),lng:p.coords.longitude.toFixed(4)};res();},rej,{timeout:10000}));
  }catch(e){
    toast('⚠️ Location required!','err');
    if(result)result.innerHTML='<span style="color:var(--rd)">❌ Enable GPS and try again</span>';
    return;
  }
  // Try camera
  try{
    var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    var vid=document.getElementById('att-video'),prev=document.getElementById('att-camera-preview');
    if(vid&&prev){vid.srcObject=stream;prev.style.display='block';await vid.play();await new Promise(r=>setTimeout(r,1500));stream.getTracks().forEach(t=>t.stop());prev.style.display='none';}
  }catch(e){}
  var now=new Date(),timeStr=now.toTimeString().slice(0,5);
  var data={employee_id:empId,attendance_date:today(),status:'present',remarks:`Online · ${location.lat},${location.lng}`};
  if(type==='in') data.in_time=timeStr; else data.out_time=timeStr;
  var r=await API.post('/hr/attendance',data);
  if(r?.success||!r){
    var msg=`${type==='in'?'✅ IN':'🚪 OUT'} at ${timeStr} · 📍 Location captured`;
    toast(msg,'ok');
    if(result)result.innerHTML=`<div class="b bg" style="padding:8px 14px">${msg}</div>`;
    addNotification('Attendance',msg);
  }
}

async function loadEmpDropdowns(){

  var d=document.getElementById('ef-dept'),dg=document.getElementById('ef-desig'),gr=document.getElementById('ef-grade'),mgr=document.getElementById('ef-mgr');

async function loadEmpList(q=''){
  var tbody=document.getElementById('emp-list-body');if(!tbody)return;
  var r=await API.get('/hr/employees',{page:1,page_size:20,search:q||null});
  var data=r?.data||Array.from({length:5},(_,i)=>({id:'x'+i,employee_code:'EMP-00'+(i+1),first_name:'Employee',last_name:i+1,departments:{name:'IT'},designations:{name:'Officer'},mobile_number:'0170000'+(i+1),employee_status:'active'}));
  tbody.innerHTML=data.map((e,i)=>`<tr>
    <td>${i+1}</td>
    <td><code style="font-family:var(--mono);color:var(--am);font-size:11px">${e.employee_code}</code></td>
    <td><strong>${e.first_name||''} ${e.last_name||''}</strong></td>
    <td>${e.departments?.name||'—'}</td>
    <td>${e.designations?.name||'—'}</td>
    <td>${e.mobile_number||'—'}</td>
    <td>${badge(e.employee_status||'active')}</td>
    <td><button class="btn btn-s btn-sm" onclick="">✏️</button><button class="btn btn-b btn-sm" onclick="genIdCard('${e.id}')">🪪</button></td>
  </tr>`).join('');
}
function searchEmp(q){clearTimeout(window._se);window._se=setTimeout(()=>loadEmpList(q),400);}
async function submitEmployee(){
  var form=document.getElementById('frm-emp-profile');if(!form)return;
  var data=fd(form);
  if(!data.employee_code||!data.first_name){toast('Employee Code and First Name required','wrn');return;}
  var createUser=document.getElementById('createUserAcc')?.checked;
  if(createUser){
    if(!data.user_email){toast('User email required','wrn');return;}
    if(!data.user_password||data.user_password.length<8){toast('Password min 8 chars','wrn');return;}
    if(data.user_password!==data.user_confirm){toast('Passwords do not match','wrn');return;}
  }
  var r=await API.post('/hr/employees',data);
  if(r?.success||r?.data||!r){
    toast('✅ Employee saved!','ok');
    addNotification('Employee Created',`${data.first_name} ${data.last_name||''} (${data.employee_code})`);
    if(createUser&&data.user_email){
      await API.post('/auth/users',{email:data.user_email,password:data.user_password,full_name:data.first_name+' '+(data.last_name||''),role:data.user_role||'general'});
      toast('✅ User account created!','ok');
    }
    loadEmpList();
  }
}

  var r=await API.post('/hr/attendance',data);
  if(r?.success||!r){toast('✅ Saved!','ok');loadAttData();}
}
function previewAttFile(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=e.target.result.trim().split('\n').slice(1).map(r=>r.split(','));
    var tbody=document.getElementById('att-preview-body');if(!tbody)return;
    var matched=0;
    tbody.innerHTML=rows.slice(0,20).map(r=>{
      var code=r[0]?.trim();
      var found=C.employees.find(e=>e.employee_code===code);
      if(found)matched++;
      return `<tr><td><code style="font-family:var(--mono);color:var(--am)">${code||'?'}</code></td><td>${r[1]?.trim()||'—'}</td><td>${r[2]?.trim()||'—'}</td><td>${r[3]?.trim()||'—'}</td><td>${badge(r[4]?.trim()||'present')}</td><td><span class="b ${found?'bg':'br'}">${found?'✅':'❌'}</span></td></tr>`;
    }).join('');
    document.getElementById('att-preview').style.display='block';
    var st=document.getElementById('att-file-stats');if(st)st.textContent=rows.length+' rows, '+matched+' matched';
    window._attData=rows;
  };
  reader.readAsText(file);
}
async function importAttendance(){
  var rows=window._attData||[];if(!rows.length){toast('No data','wrn');return;}
  var ok=0;
  for(var row of rows){
    var code=row[0]?.trim();
    var emp=C.employees.find(e=>e.employee_code===code);
    if(!emp)continue;
    await API.post('/hr/attendance',{employee_id:emp.id,attendance_date:row[1]?.trim(),in_time:row[2]?.trim()||null,out_time:row[3]?.trim()||null,status:row[4]?.trim()||'present',is_manual:true});
    ok++;
  }
  toast('✅ Imported '+ok+' records!','ok');
  document.getElementById('att-preview').style.display='none';
  addNotification('Attendance Imported',ok+' records synced');
}
async function markOnline(type){
  var empId=document.getElementById('online-emp-id')?.value;
  if(!empId){toast('Select employee','wrn');return;}
  var result=document.getElementById('att-result');
  if(result)result.textContent='Getting location...';
  var location=null;
  try{
    await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>{location={lat:p.coords.latitude.toFixed(4),lng:p.coords.longitude.toFixed(4)};res();},rej,{timeout:10000}));
  }catch(e){
    toast('⚠️ Location required!','err');
    if(result)result.innerHTML='<span style="color:var(--rd)">❌ Enable GPS and try again</span>';
    return;
  }
  // Try camera
  try{
    var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    var vid=document.getElementById('att-video'),prev=document.getElementById('att-camera-preview');
    if(vid&&prev){vid.srcObject=stream;prev.style.display='block';await vid.play();await new Promise(r=>setTimeout(r,1500));stream.getTracks().forEach(t=>t.stop());prev.style.display='none';}
  }catch(e){}
  var now=new Date(),timeStr=now.toTimeString().slice(0,5);
  var data={employee_id:empId,attendance_date:today(),status:'present',remarks:`Online · ${location.lat},${location.lng}`};
  if(type==='in') data.in_time=timeStr; else data.out_time=timeStr;
  var r=await API.post('/hr/attendance',data);
  if(r?.success||!r){
    var msg=`${type==='in'?'✅ IN':'🚪 OUT'} at ${timeStr} · 📍 Location captured`;
    toast(msg,'ok');
    if(result)result.innerHTML=`<div class="b bg" style="padding:8px 14px">${msg}</div>`;
    addNotification('Attendance',msg);
  }
}

function calcLeaveDays(){

  document.querySelectorAll('[name^="vl_dr_"]').forEach(el=>dr+=parseFloat(el.value||0));

function calcInst(){
  var t=parseFloat(document.querySelector('[name="total_amount"]')?.value||0);
  var d=parseFloat(document.querySelector('[name="down_payment"]')?.value||0);
  var n=parseInt(document.querySelector('[name="total_installments"]')?.value||12);
  var r=parseFloat(document.querySelector('[name="interest_rate"]')?.value||0);
  var fin=t-d;var interest=fin*(r/100)*(n/12);var monthly=n>0?(fin+interest)/n:0;
  var f=document.getElementById('cs-financed'),m=document.getElementById('cs-monthly'),tp=document.getElementById('cs-total');
  if(f)f.textContent='৳'+fmt(fin);if(m)m.textContent='৳'+fmt(monthly);if(tp)tp.textContent='৳'+fmt(fin+interest);
}

  var form=document.getElementById('frm-cs');if(!form)return;

  data.total_amount=parseFloat(data.total_amount);data.down_payment=parseFloat(data.down_payment||0);
  data.total_installments=parseInt(data.total_installments);data.interest_rate=parseFloat(data.interest_rate||0);
  var r=await API.post('/credit-sales/',data);
